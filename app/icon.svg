<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Badge « cabinet arcade » : fond sombre + fin liseré orange (identité K1000). -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="14" fill="#17130D" stroke="#FF7A00" stroke-width="3"/>
  <!-- « K » en pixels (blocs de 6px) pour coller au wordmark Press Start 2P, en or. -->
  <g fill="#FFD23F">
    <!-- Jambage vertical (2 blocs de large) -->
    <rect x="17" y="11" width="6" height="6"/><rect x="23" y="11" width="6" height="6"/>
    <rect x="17" y="17" width="6" height="6"/><rect x="23" y="17" width="6" height="6"/>
    <rect x="17" y="23" width="6" height="6"/><rect x="23" y="23" width="6" height="6"/>
    <rect x="17" y="29" width="6" height="6"/><rect x="23" y="29" width="6" height="6"/>
    <rect x="17" y="35" width="6" height="6"/><rect x="23" y="35" width="6" height="6"/>
    <rect x="17" y="41" width="6" height="6"/><rect x="23" y="41" width="6" height="6"/>
    <rect x="17" y="47" width="6" height="6"/><rect x="23" y="47" width="6" height="6"/>
    <!-- Bras supérieur (diagonale) -->
    <rect x="41" y="11" width="6" height="6"/>
    <rect x="35" y="17" width="6" height="6"/>
    <rect x="29" y="23" width="6" height="6"/>
    <!-- Sommet du V (jonction) -->
    <rect x="29" y="29" width="6" height="6"/>
    <!-- Bras inférieur (diagonale) -->
    <rect x="29" y="35" width="6" height="6"/>
    <rect x="35" y="41" width="6" height="6"/>
    <rect x="41" y="47" width="6" height="6"/>
  </g>
</svg>
